name: Deploy sanity

on:
  pull_request:
  push:
    branches: [main]

env:
  NODE_ENV: test
  PORT: 34567
  JWT_SECRET: test_jwt_secret_minimum_32_chars_long
  CLIENT_SECRET: test_client_secret_minimum_32_chars
  CLIENT_ID: ai-stickers-test
  TELEGRAM_BOT_TOKEN: test-token
  DATA_DIR: ./tmp-data

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json start script and deploy sanity
        run: node scripts/deploy-sanity-check.js
